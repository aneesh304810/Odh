apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests shared across environments.
# Applied once per namespace where developers will run workbenches.
#
# Note: pvc-template.yaml and secret-oracle-template.yaml are NOT applied
# by default — they are references. Kustomize them in per-developer
# overlays or generate via an external workflow.

resources:
  - namespace.yaml
  - rbac.yaml

commonLabels:
  app.kubernetes.io/part-of: codeserver-airflow-dbt
  app.kubernetes.io/managed-by: kustomize
