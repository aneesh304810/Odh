# ServiceAccount used by workbench pods spawned from this image.
#
# Scoped narrowly: only needs to read its own namespace's Secrets and
# ConfigMaps (for per-user Oracle creds) and submit KubernetesExecutor pods
# if the developer opts in.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: codeserver-workbench
  labels:
    opendatahub.io/dashboard: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codeserver-workbench
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
  # Required only if developers enable KubernetesExecutor in their workbench.
  # Leave in place — pods spawned by Airflow will run under this SA.
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codeserver-workbench
subjects:
  - kind: ServiceAccount
    name: codeserver-workbench
roleRef:
  kind: Role
  name: codeserver-workbench
  apiGroup: rbac.authorization.k8s.io
