# Per-developer Oracle credentials Secret.
#
# One of these should exist in each developer's workbench namespace. The
# Notebook CR references it via envFrom so ORACLE_USER, ORACLE_PASSWORD, etc.
# are exposed to the pod and picked up by the entrypoint when rendering
# profiles.yml.
#
# DO NOT COMMIT REAL CREDENTIALS. This file is a template. Generate the real
# Secret with a separate sealed-secrets / vault-sync workflow.
#
# Example creation (for testing only):
#
#   oc create secret generic oracle-dev \
#     --from-literal=ORACLE_HOST=oracledev.bbh.com \
#     --from-literal=ORACLE_PORT=1521 \
#     --from-literal=ORACLE_SERVICE=DEVPDB \
#     --from-literal=ORACLE_USER=aneesh_dev \
#     --from-literal=ORACLE_PASSWORD='redacted' \
#     --from-literal=ORACLE_SCHEMA=ANEESH_DEV
apiVersion: v1
kind: Secret
metadata:
  name: oracle-dev
  labels:
    opendatahub.io/dashboard: "true"
type: Opaque
stringData:
  ORACLE_HOST:     "REPLACE_ME"
  ORACLE_PORT:     "1521"
  ORACLE_SERVICE:  "REPLACE_ME"
  ORACLE_USER:     "REPLACE_ME"
  ORACLE_PASSWORD: "REPLACE_ME"
  ORACLE_SCHEMA:   "REPLACE_ME"
